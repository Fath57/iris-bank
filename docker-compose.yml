name: bank-platform

services:
  dev-db:
    image: postgres:17.6
    container_name: bank-db
    ports:
      - "5435:5432"
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123}
      POSTGRES_DB: bank-platform
    networks:
      - networkName

  backend:
    build:
      context: ./backend
    container_name: bank-backend
    ports:
      - "5001:5001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env
    depends_on:
      - dev-db
    networks:
      - networkName
    command: >
      sh -c "npm rebuild esbuild
      && npx prisma generate
      && npx prisma migrate deploy
      && npm run dev"

  frontend:
    build:
      context: ./frontend
      target: build
    container_name: bank-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - networkName
    command: >
      sh -c "npm rebuild rollup vite esbuild
      && npm run dev -- --host"

networks:
  networkName:
