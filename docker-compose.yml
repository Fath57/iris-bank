name: bank-platform

services:
  dev-db:
    image: postgres:17.6
    container_name: bank-db
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: bank-platform
    networks:
      - networkName

  backend:
    build: 
      context: ./backend
    container_name: bank-backend
    ports:
      - "5001:5001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - DATABASE_URL=postgresql://postgres:123@dev-db:5432/bank-platform?schema=public
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
    depends_on:
      - dev-db
    networks:
      - networkName
    command: >
      sh -c "npx prisma generate 
      && npx prisma migrate deploy 
      && npm run dev"

  frontend:
    build:
      context: ./frontend
    container_name: bank-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - networkName

networks:
  networkName: